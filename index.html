<!DOCTYPE html>
<html class="dark" lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rodolfo Ferreira — Web Design, Sistemas & IA</title>
    <meta name="description" content="Crio sites, landing pages, sistemas internos e soluções digitais com foco em clareza, usabilidade e resultado real." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rodolfo Ferreira — Web Design, Sistemas & IA" />
    <meta property="og:description" content="Crio sites, landing pages, sistemas internos e soluções digitais com foco em clareza, usabilidade e resultado real." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://rodolfoferreira.com.br" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rodolfo Ferreira — Web Design, Sistemas & IA" />
    <meta name="twitter:description" content="Web Design, Sistemas Internos e IA para negócios reais." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />

    <!-- Google Fonts — preconnect first to reduce DNS lookup latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Core fonts: swap so text renders immediately in fallback -->
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Icons: swap prevents icon-flash from blocking render; subset to Outlined only -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
